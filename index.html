<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05060a" />

    <!-- Primary meta -->
    <title>Chronos Lab — Decision intelligence that explores futures first</title>
    <meta name="description" content="Chronos Lab is a decision intelligence platform. It plans tasks, simulates multiple possible futures, evaluates trade-offs, and recommends the strongest path — for people and autonomous agents." />
    <meta name="keywords" content="chronos, chronos lab, temporal compute, decision intelligence, autonomous agents, simulation engine, AI infrastructure, ranked futures" />
    <meta name="author" content="Chronos Lab" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://chronoslab.space/" />

    <!-- Domain & DNS hints -->
    <link rel="dns-prefetch" href="https://api.chronoslab.space" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chronos Lab" />
    <meta property="og:title" content="Chronos Lab — Make agents think before they act" />
    <meta property="og:description" content="Decision intelligence that branches, evaluates, and collapses possible futures — then recommends the strongest path." />
    <meta property="og:url" content="https://chronoslab.space/" />
    <meta property="og:image" content="https://chronoslab.space/og-image.png" />
    <meta property="og:image:secure_url" content="https://chronoslab.space/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chronos Lab" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X large card thumbnail (public/og-image.png from brand mark) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@chronoslabspace" />
    <meta name="twitter:creator" content="@chronoslabspace" />
    <meta name="twitter:title" content="Chronos Lab — Make agents think before they act" />
    <meta name="twitter:description" content="Decision intelligence that explores multiple futures, ranks trade-offs, and recommends the strongest path." />
    <meta name="twitter:image" content="https://chronoslab.space/og-image.png" />
    <meta name="twitter:image:alt" content="Chronos Lab" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/og-image-source.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"

    />
