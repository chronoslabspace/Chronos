name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vite bakes VITE_* into the static bundle at build time.
      # Set these under: Repo → Settings → Secrets and variables → Actions
      - name: Typecheck
        run: npx tsc --noEmit

      # Vite prefers process env over .env.production. Empty Actions secrets become
      # "" and would wipe committed public client keys — only export non-empty values.
      - name: Build
        env:
          SECRET_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SECRET_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SECRET_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          if [ -n "$SECRET_SUPABASE_URL" ]; then
            export VITE_SUPABASE_URL="$SECRET_SUPABASE_URL"
            echo "Using VITE_SUPABASE_URL from Actions secrets"
          else
            echo "::notice::VITE_SUPABASE_URL secret unset — Vite will use .env.production if present"
          fi
          if [ -n "$SECRET_SUPABASE_ANON_KEY" ]; then
            export VITE_SUPABASE_ANON_KEY="$SECRET_SUPABASE_ANON_KEY"
            echo "Using VITE_SUPABASE_ANON_KEY from Actions secrets"
          else
            echo "::notice::VITE_SUPABASE_ANON_KEY secret unset — Vite will use .env.production if present"
          fi
          if [ -n "$SECRET_SENTRY_DSN" ]; then
            export VITE_SENTRY_DSN="$SECRET_SENTRY_DSN"
            echo "Using VITE_SENTRY_DSN from Actions secrets"
          else
            echo "::notice::VITE_SENTRY_DSN secret unset — Vite will use .env.production if present"
          fi
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
